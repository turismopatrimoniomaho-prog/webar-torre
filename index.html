<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector/master/dist/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector/master/dist/gesture-handler.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      gesture-detector> <a-assets>
        <a-asset-item id="modeloTorre" src="./torre.skfb.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#modeloTorre" 
          position="0 0 0" 
          scale="50 50 50" 
          rotation="0 0 0"
          class="clickable"
          gesture-handler="rotationBin: x; minScale: 0.2; maxScale: 3">
          </a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
