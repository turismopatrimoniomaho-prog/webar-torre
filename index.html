<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-three.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
<style>
body { margin: 0; overflow: hidden; }
canvas { position: absolute; top: 0; left: 0; }
</style>
</head>

<body>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.body,
    imageTargetSrc: "./targets.mind"
  });

  const {renderer, scene, camera} = mindarThree;

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  const anchor = mindarThree.addAnchor(0);

  const loader = new THREE.GLTFLoader();
  loader.load("./torre.skfb.glb", (gltf) => {
      const model = gltf.scene;
      model.scale.set(50, 50, 50);
      anchor.group.add(model);

      let initialDistance = 0;
      let currentScale = 0.3;

      document.addEventListener("touchmove", (event) => {

        // ROTAR con un dedo
        if (event.touches.length === 1) {
          const touch = event.touches[0];
          model.rotation.y += touch.movementX * 0.01;
        }

        // ZOOM con dos dedos
        if (event.touches.length === 2) {
          const dx = event.touches[0].clientX - event.touches[1].clientX;
          const dy = event.touches[0].clientY - event.touches[1].clientY;
          const distance = Math.sqrt(dx*dx + dy*dy);

          if (initialDistance === 0) {
            initialDistance = distance;
          } else {
            let scaleFactor = distance / initialDistance;
            currentScale = 0.3 * scaleFactor;
            model.scale.set(currentScale, currentScale, currentScale);
          }
        }

      });

      document.addEventListener("touchend", () => {
        initialDistance = 0;
      });

  });

  await mindarThree.start();
  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });

});
</script>

</body>
</html>
